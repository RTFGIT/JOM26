<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Downloading…</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #2EA37A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #C62828; display: none; }
    a { color: #2EA37A; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Preparing your download…</p>
    <p class="error" id="error">
      Download failed. <a id="direct-link" href="#">Click here to try manually</a>.
    </p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var filePath = params.get('file');

      if (!filePath) {
        document.getElementById('status').textContent = 'No file specified.';
        document.getElementById('spinner').style.display = 'none';
        return;
      }

      // Build the raw GitHub URL from the relative file path
      var baseUrl = 'https://raw.githubusercontent.com/RTFGIT/JOM26/main/';
      var rawUrl = baseUrl + filePath;

      // Extract filename from path
      var filename = filePath.split('/').pop();

      document.getElementById('direct-link').href = rawUrl;
      document.getElementById('status').textContent = 'Downloading ' + decodeURIComponent(filename) + '…';

      fetch(rawUrl)
        .then(function (response) {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.blob();
        })
        .then(function (blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = decodeURIComponent(filename);
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          document.getElementById('spinner').style.display = 'none';
          var countdown = 10;
          document.getElementById('status').textContent = 'Download started! This tab will close in ' + countdown + 's…';
          var closeTimer = setInterval(function () {
            countdown--;
            if (countdown <= 0) {
              clearInterval(closeTimer);
              window.close();
              // Fallback if window.close() is blocked by the browser
              document.getElementById('status').textContent = 'Download complete. You can close this tab.';
            } else {
              document.getElementById('status').textContent = 'Download started! This tab will close in ' + countdown + 's…';
            }
          }, 1000);
        })
        .catch(function (err) {
          console.error('Download failed:', err);
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('status').style.display = 'none';
          document.getElementById('error').style.display = 'block';
        });
    })();
  </script>
</body>
</html>
