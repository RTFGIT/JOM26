<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOM26 Box Labels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'AvenirBlack';
      src: url('./assets/Fonts/avenir-black/avenir-black.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: transparent;
      overflow: hidden;
    }

    #labels-scale-root {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .labels-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 1284px;
      height: 65px;
      background: transparent;
      padding-bottom: 10px;
      transform-origin: top left;
    }

    .boxes-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      height: 100%;
    }

    .box-wrapper {
      display: flex;
      flex-direction: column;
      width: 156px;
      border-radius: 14px;
      box-shadow: 1px 4px 4px 0px rgba(6, 57, 65, 0.5);
    }

    .token-box {
      width: 156px;
      height: 55px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .token-box[data-box="1"] { background: linear-gradient(137deg, #ffd342 0%, #ffbf42 100%); }
    .token-box[data-box="2"] { background: linear-gradient(137deg, #eb8f05 0%, #c35b0f 100%); }
    .token-box[data-box="3"] { background: linear-gradient(137deg, #50d867 0%, #39b04d 100%); }
    .token-box[data-box="4"] { background: linear-gradient(137deg, #39b083 0%, #1d9064 100%); }
    .token-box[data-box="5"] { background: linear-gradient(137deg, #075966 0%, #063941 100%); }

    /* ── Holding mode — hide labels during pre-launch ──────────────── */
    .labels-container {
      transition: opacity 0.8s ease-in-out;
    }

    .labels-container.holding-hidden {
      opacity: 0 !important;
      pointer-events: none;
    }

    .box-label {
      font-family: 'AvenirBlack', sans-serif;
      font-size: 15.6px;
      font-weight: normal;
      color: #ffffff;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: pre-line;
      padding-top: 2px;
    }
  </style>
</head>
<body>
  <div id="labels-scale-root">
    <div class="labels-container">
      <div class="boxes-row">
        <div class="box-wrapper">
          <div class="token-box" data-box="1">
            <div class="box-label">IN YOUR
BASKET</div>
          </div>
        </div>
        <div class="box-wrapper">
          <div class="token-box" data-box="2">
            <div class="box-label">IN YOUR
GARDEN</div>
          </div>
        </div>
        <div class="box-wrapper">
          <div class="token-box" data-box="3">
            <div class="box-label">ON YOUR
PLATE</div>
          </div>
        </div>
        <div class="box-wrapper">
          <div class="token-box" data-box="4">
            <div class="box-label">IN YOUR
MEAL</div>
          </div>
        </div>
        <div class="box-wrapper">
          <div class="token-box" data-box="5">
            <div class="box-label">AS YOUR
SNACK</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Responsive scaling ─────────────────────────────────────────── -->
  <script>
    (function () {
      var DESKTOP_W = 1284;
      var DESKTOP_H = 65;
      var MOBILE_W  = 900;
      var MOBILE_H  = 80;
      var MOBILE_BP = 600;
      var PADDING   = 10;
      var lastMobile = null;

      function scaleWidget() {
        var el   = document.querySelector('.labels-container');
        var root = document.getElementById('labels-scale-root');
        if (!el || !root) return;

        var isMobile = window.innerWidth <= MOBILE_BP;
        var designW  = isMobile ? MOBILE_W  : DESKTOP_W;
        var designH  = isMobile ? MOBILE_H  : DESKTOP_H;

        if (isMobile !== lastMobile) {
          lastMobile = isMobile;
          el.style.width  = designW + 'px';
          el.style.height = designH + 'px';

          document.querySelectorAll('.token-box').forEach(function (box) {
            box.style.height = isMobile ? '70px' : '55px';
          });
          document.querySelectorAll('.box-label').forEach(function (lbl) {
            lbl.style.fontSize = isMobile ? '22px' : '15.6px';
          });
        }

        var scale   = (window.innerWidth - 2 * PADDING) / designW;
        var scaledH = Math.ceil(designH * scale);

        el.style.left      = PADDING + 'px';
        el.style.transform = 'scale(' + scale + ')';

        root.style.height                    = scaledH + 'px';
        document.body.style.height           = scaledH + 'px';
        document.documentElement.style.height = scaledH + 'px';

        try { window.parent.postMessage({ type: 'LABELS_HEIGHT', height: scaledH }, '*'); } catch (e) {}
      }

      window.addEventListener('resize', scaleWidget);
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', scaleWidget);
      } else {
        scaleWidget();
      }
    })();
  </script>

  <!-- ── Launch config — hide labels during holding mode ───────────── -->
  <script type="module" src="./widget-config.js"></script>
  <script type="module">
    import { startLaunchConfigListener } from './patch-widget-listener.js';
    import { db } from './widget-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // Load box labels from Firestore (public/box-labels)
    (async () => {
      try {
        const snap = await getDoc(doc(db, 'public', 'box-labels'));
        if (snap.exists() && Array.isArray(snap.data().labels) && snap.data().labels.length === 5) {
          const labels = snap.data().labels;
          document.querySelectorAll('.box-label').forEach((el, i) => {
            el.textContent = labels[i];
          });
          console.log('[JOM26] Box labels loaded from Firestore');
        }
      } catch (err) {
        console.warn('[JOM26] Could not load box labels:', err);
      }
    })();

    let firstLoad = true;
    let labelsHidden = false;
    let storedLaunchDate = null;
    let storedLaunchTime = null;
    let autoLaunchTimer = null;

    function setLabelsLive(container, animate) {
      if (!labelsHidden && !firstLoad) return; // already visible
      if (animate) {
        // Delay: ~3.5s eruption + 0.8s box fade-in + 1s gap = 5.3s
        setTimeout(() => { container.classList.remove('holding-hidden'); }, 5300);
      } else {
        container.classList.remove('holding-hidden');
      }
      labelsHidden = false;
      if (autoLaunchTimer) { clearInterval(autoLaunchTimer); autoLaunchTimer = null; }
    }

    function setLabelsHolding(container, instant) {
      if (instant) {
        container.style.transition = 'none';
        container.classList.add('holding-hidden');
        requestAnimationFrame(() => { container.style.transition = ''; });
      } else {
        container.classList.add('holding-hidden');
      }
      labelsHidden = true;

      // Start polling for auto-launch by time (Firestore won't re-fire)
      if (autoLaunchTimer) clearInterval(autoLaunchTimer);
      autoLaunchTimer = setInterval(() => {
        if (storedLaunchDate && storedLaunchTime) {
          const target = new Date(storedLaunchDate + 'T' + storedLaunchTime);
          if (new Date() >= target) {
            setLabelsLive(container, true);
          }
        }
      }, 1000);
    }

    startLaunchConfigListener(({ campaignLive, launchDate, launchTime }) => {
      const container = document.querySelector('.labels-container');
      if (!container) return;

      storedLaunchDate = launchDate;
      storedLaunchTime = launchTime;

      if (campaignLive) {
        setLabelsLive(container, !firstLoad);
      } else {
        setLabelsHolding(container, firstLoad);
      }
      firstLoad = false;
    });
  </script>
</body>
</html>
